name: Deploy Vite App to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Clear Old Files on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 82.29.188.64
          username: ${{ secrets.WEBANATOMYSSHUSER }}
          key: ${{ secrets.WEBANATOMYSSHKEY }}
          port: 65002
          script: |
            rm -rf public_html/web/*

      - name: Upload New Build Files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 82.29.188.64
          username: ${{ secrets.WEBANATOMYSSHUSER }}
          key: ${{ secrets.WEBANATOMYSSHKEY }}
          port: 65002
          source: "dist/*"
          target: "public_html/web"
          strip_components: 1